<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Control Remoto — Proyector de Servicio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
<style>
:root {
  --bg:#14181F; --panel:#1C232E; --panel-raised:#222A36;
  --border:#2A3340; --amber:#E8AA4C; --amber-dim:#8a6a36;
  --teal:#5FB3B3; --red:#D96C6C;
  --text:#F2F0EA; --text-muted:#8B93A1; --text-faint:#5A6271;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; background:var(--bg); color:var(--text); font-family:'Space Grotesk',system-ui,sans-serif; overflow:hidden; }

/* ── LAYOUT ── */
.app{ display:flex; flex-direction:column; height:100dvh; }

/* ── HEADER ── */
.header{
  background:var(--panel); border-bottom:1px solid var(--border);
  padding:10px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.logo{ width:30px; height:30px; border-radius:7px; background:linear-gradient(160deg,#E8AA4C,#c98a2e); display:flex; align-items:center; justify-content:center; font-weight:700; color:#1a1308; font-size:13px; flex-shrink:0; }
.header-title{ font-size:13px; font-weight:600; margin-left:10px; }
.header-right{ display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.live-badge{ display:flex; align-items:center; gap:5px; font-size:11px; border:1px solid var(--border); border-radius:20px; padding:3px 9px; }
.dot{ width:7px; height:7px; border-radius:50%; background:var(--text-faint); flex-shrink:0; }
.dot.on{ background:var(--teal); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(95,179,179,.55)} 70%{box-shadow:0 0 0 5px rgba(95,179,179,0)} 100%{box-shadow:0 0 0 0 rgba(95,179,179,0)} }
.conn-status{ font-size:10px; color:var(--text-faint); }
.conn-status.ok{ color:var(--teal); }

/* ── SCROLL PRINCIPAL ── */
.main{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:0; }

/* ── SECCIÓN: LISTA DE SERVICIO ── */
.section-label{
  font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-faint);
  padding:10px 14px 6px; font-weight:600;
}
.timeline-scroll{
  overflow-x:auto; overflow-y:hidden; display:flex; gap:8px;
  padding:0 14px 12px; scroll-snap-type:x mandatory;
}
.timeline-scroll::-webkit-scrollbar{ height:3px; }
.timeline-scroll::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }
.tl-card{
  flex-shrink:0; width:110px; height:72px; border-radius:8px;
  border:1px solid var(--border); background:var(--panel-raised);
  padding:8px 10px; display:flex; flex-direction:column; justify-content:space-between;
  cursor:pointer; scroll-snap-align:start; transition:border-color .12s;
}
.tl-card:active{ background:var(--panel); }
.tl-card.live{ border-color:var(--teal); box-shadow:0 0 0 1px var(--teal); }
.tl-type{ font-size:9px; letter-spacing:.05em; color:var(--text-faint); text-transform:uppercase; }
.tl-title{ font-size:11px; font-weight:600; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.tl-empty{ padding:20px 14px; color:var(--text-faint); font-size:12px; }

/* ── SECCIÓN: AUDIO ── */
.audio-section{ background:var(--panel); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
.audio-top{ padding:10px 14px 8px; }
.audio-track{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.audio-sub{ font-size:10px; color:var(--text-faint); margin-bottom:8px; }
.audio-progress-wrap{ height:6px; background:var(--bg); border-radius:3px; cursor:pointer; overflow:hidden; border:1px solid var(--border); margin-bottom:8px; }
.audio-fill{ height:100%; background:var(--teal); border-radius:3px; transition:width .8s linear; }
.audio-controls{ display:flex; align-items:center; gap:10px; }
.a-btn{
  width:40px; height:40px; border-radius:50%; border:1px solid var(--border);
  background:var(--panel-raised); color:var(--text); cursor:pointer; font-size:18px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.a-btn.primary{ background:var(--amber); border-color:var(--amber); color:#1a1308; width:48px; height:48px; font-size:22px; }
.a-btn:active{ filter:brightness(1.3); }
.audio-name-scroll{ flex:1; overflow:hidden; }

/* Lista de pistas horizontal */
.audio-list-scroll{
  overflow-x:auto; display:flex; gap:6px; padding:0 14px 10px;
  scroll-snap-type:x mandatory;
}
.audio-list-scroll::-webkit-scrollbar{ height:3px; }
.audio-list-scroll::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }
.audio-pill{
  flex-shrink:0; border-radius:20px; border:1px solid var(--border);
  background:var(--panel-raised); padding:6px 12px; cursor:pointer;
  font-size:11px; white-space:nowrap; scroll-snap-align:start;
  max-width:150px; overflow:hidden; text-overflow:ellipsis;
  transition:border-color .12s;
}
.audio-pill:active{ background:var(--panel); }
.audio-pill.active{ border-color:var(--teal); color:var(--teal); }
.audio-empty{ padding:0 14px 10px; font-size:12px; color:var(--text-faint); }

/* ── SECCIÓN: PREVIEW ── */
.preview-section{ padding:12px 14px; }
.preview-frame{
  aspect-ratio:16/9; background:#000; border-radius:10px;
  border:1px solid var(--border); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.preview-text{
  color:#fff; font-size:5vw; text-align:center; padding:14px;
  line-height:1.45; white-space:pre-wrap; font-weight:600;
}
.preview-text .ref{ display:block; margin-top:10px; font-size:.5em; opacity:.75; font-weight:500; }
.preview-img{ width:100%; height:100%; object-fit:contain; }
.preview-empty{ color:#333; font-size:13px; }

/* ── PANEL INFERIOR: controles de diapositiva ── */
.bottom-controls{
  flex-shrink:0; background:var(--panel); border-top:1px solid var(--border);
  padding:10px 14px; display:flex; align-items:center; gap:10px;
}
.slide-btn{
  width:48px; height:48px; border-radius:50%; border:1px solid var(--border);
  background:var(--panel-raised); color:var(--text); cursor:pointer; font-size:24px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.slide-btn:active{ border-color:var(--amber); color:var(--amber); }
.slide-info{ flex:1; text-align:center; }
.slide-counter{ font-size:18px; font-weight:700; color:var(--text); }
.slide-subtitle{ font-size:11px; color:var(--text-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.clear-btn{
  background:transparent; border:1px solid var(--border); color:var(--text-muted);
  border-radius:8px; padding:10px 12px; font-size:12px; cursor:pointer; flex-shrink:0;
}
.clear-btn:active{ border-color:var(--red); color:var(--red); background:rgba(217,108,108,.1); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;align-items:center;">
      <div class="logo">P</div>
      <span class="header-title">Proyector de Servicio</span>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="dot" id="dotLive"></span>
        <span id="liveText">SIN SEÑAL</span>
      </div>
      <span class="conn-status" id="connStatus">Conectando...</span>
    </div>
  </div>

  <!-- MAIN SCROLL -->
  <div class="main">

    <!-- LISTA DE SERVICIO -->
    <div class="section-label">Lista de Servicio</div>
    <div class="timeline-scroll" id="timelineScroll">
      <div class="tl-empty">Sin lista de servicio activa.</div>
    </div>

    <!-- AUDIO -->
    <div class="audio-section">
      <div class="audio-top">
        <div class="audio-track" id="audioTrack">Sin pista seleccionada</div>
        <div class="audio-sub" id="audioSub">—</div>
        <div class="audio-progress-wrap" id="audioProgressWrap">
          <div class="audio-fill" id="audioFill" style="width:0%"></div>
        </div>
        <div class="audio-controls">
          <button class="a-btn" id="rAudioPrev" title="Reiniciar">↺</button>
          <button class="a-btn primary" id="rAudioPlay">▶</button>
          <button class="a-btn" id="rAudioNext" title="Siguiente">⏭</button>
        </div>
      </div>
      <div class="audio-list-scroll" id="audioListScroll">
        <div class="audio-empty">Carga una carpeta de audio desde la Chromebook.</div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-section">
      <div class="section-label" style="padding:0 0 8px;">En proyección</div>
      <div class="preview-frame" id="previewFrame">
        <span class="preview-empty">Nada en proyección</span>
      </div>
    </div>

  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="bottom-controls">
    <button class="slide-btn" id="btnPrev">‹</button>
    <div class="slide-info">
      <div class="slide-counter" id="slideCounter">—</div>
      <div class="slide-subtitle" id="slideSubtitle">Sin proyección</div>
    </div>
    <button class="slide-btn" id="btnNext">›</button>
    <button class="clear-btn" id="btnClear">✕ Limpiar</button>
  </div>

</div>

<script>
let remoteState = null;
let mqttClient = null;
const room = new URLSearchParams(window.location.search).get('room') || 'ps-default';

// ── MQTT ──
function connectMQTT() {
  const clientId = 'remote-' + Math.random().toString(36).slice(2, 8);
  mqttClient = new Paho.Client('broker.hivemq.com', 8884, '/mqtt', clientId);
  mqttClient.onConnectionLost = function() {
    setConn(false);
    setTimeout(connectMQTT, 3000);
  };
  mqttClient.onMessageArrived = function(msg) {
    try {
      const data = JSON.parse(msg.payloadString);
      if (data.type === 'state') { remoteState = data; updateAll(); }
    } catch(_) {}
  };
  mqttClient.connect({
    useSSL: true, keepAliveInterval: 30,
    onSuccess: function() {
      setConn(true);
      mqttClient.subscribe('proyector/' + room + '/state');
      sendCmd('request-state');
    },
    onFailure: function() { setConn(false); setTimeout(connectMQTT, 4000); }
  });
}
connectMQTT();

function setConn(ok) {
  const el = document.getElementById('connStatus');
  el.textContent = ok ? 'Conectado' : 'Reconectando...';
  el.className = 'conn-status' + (ok ? ' ok' : '');
}

function sendCmd(action, extra) {
  if (!mqttClient || !mqttClient.isConnected()) return;
  const cmd = Object.assign({ type:'cmd', action, ts:Date.now() }, extra||{});
  const msg = new Paho.Message(JSON.stringify(cmd));
  msg.destinationName = 'proyector/' + room + '/cmd';
  try { mqttClient.send(msg); } catch(_) {}
}

// ── CONTROLES ──
document.getElementById('btnPrev').addEventListener('click', () => sendCmd('prev'));
document.getElementById('btnNext').addEventListener('click', () => sendCmd('next'));
document.getElementById('btnClear').addEventListener('click', () => sendCmd('clear'));
document.getElementById('rAudioPlay').addEventListener('click', () => sendCmd('audio-play'));
document.getElementById('rAudioNext').addEventListener('click', () => sendCmd('audio-next'));
document.getElementById('rAudioPrev').addEventListener('click', () => sendCmd('audio-prev'));
document.getElementById('audioProgressWrap').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  sendCmd('audio-seek', { ratio });
});

// ── RENDER ──
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateAll() {
  if (!remoteState) return;
  updateHeader();
  updateTimeline();
  updateAudio();
  updatePreview();
  updateBottom();
}

function updateHeader() {
  const live = remoteState.payload && remoteState.payload.kind !== 'blank';
  document.getElementById('dotLive').className = 'dot' + (live ? ' on' : '');
  document.getElementById('liveText').textContent = live ? 'EN VIVO' : 'SIN SEÑAL';
}

function updateTimeline() {
  const list = (remoteState && remoteState.list) || [];
  const el = document.getElementById('timelineScroll');
  if (!list.length) { el.innerHTML = '<div class="tl-empty">Sin lista de servicio activa.</div>'; return; }
  el.innerHTML = '';
  list.forEach(function(it) {
    const card = document.createElement('div');
    card.className = 'tl-card' + (it.isLive ? ' live' : '');
    card.innerHTML = '<div class="tl-type">' + escHtml(it.type) + '</div><div class="tl-title">' + escHtml(it.title) + '</div>';
    card.addEventListener('click', function() { sendCmd('project', { collection: it.type, refId: it.refId }); });
    el.appendChild(card);
  });
}

function updateAudio() {
  const audio = (remoteState && remoteState.audio) || {};
  const files = audio.files || [];
  const ci = typeof audio.currentIndex === 'number' ? audio.currentIndex : -1;
  const playing = audio.playing || false;
  const progress = audio.duration ? (audio.currentTime / audio.duration) : 0;

  document.getElementById('audioTrack').textContent = ci >= 0 && files[ci] ? files[ci].name.replace(/\.[^.]+$/, '') : 'Sin pista seleccionada';
  document.getElementById('audioSub').textContent = files.length ? (ci >= 0 ? 'Pista ' + (ci+1) + ' de ' + files.length : files.length + ' pistas disponibles') : 'Sin pistas cargadas';
  document.getElementById('audioFill').style.width = (progress * 100).toFixed(1) + '%';
  document.getElementById('rAudioPlay').textContent = playing ? '⏸' : '▶';

  // Lista de pistas como píldoras horizontales
  const listEl = document.getElementById('audioListScroll');
  if (!files.length) { listEl.innerHTML = '<div class="audio-empty">Carga una carpeta de audio desde la Chromebook.</div>'; return; }
  listEl.innerHTML = '';
  files.forEach(function(f) {
    const pill = document.createElement('div');
    pill.className = 'audio-pill' + (f.index === ci ? ' active' : '');
    pill.textContent = f.name.replace(/\.[^.]+$/, '');
    pill.title = f.name;
    pill.addEventListener('click', function() { sendCmd('audio-select', { index: f.index }); });
    listEl.appendChild(pill);
  });
}

function updatePreview() {
  const frame = document.getElementById('previewFrame');
  const payload = remoteState && remoteState.payload;
  if (!payload || payload.kind === 'blank') {
    frame.innerHTML = '<span class="preview-empty">Nada en proyección</span>';
    return;
  }
  if (payload.kind === 'image') {
    frame.innerHTML = '<img class="preview-img" src="' + escHtml(payload.imageData) + '" />';
    return;
  }
  let html = escHtml(payload.text || '').replace(/\n/g, '<br>');
  if (payload.reference) html += '<span class="ref">— ' + escHtml(payload.reference) + '</span>';
  frame.innerHTML = '<div class="preview-text">' + html + '</div>';
}

function updateBottom() {
  const si = remoteState.slideIndex || 0;
  const total = remoteState.totalSlides || 1;
  const title = remoteState.title || '';
  const live = remoteState.payload && remoteState.payload.kind !== 'blank';

  document.getElementById('slideCounter').textContent = live ? (si+1) + ' / ' + total : '—';
  document.getElementById('slideSubtitle').textContent = live ? title : 'Sin proyección';
}
</script>
</body>
</html>
